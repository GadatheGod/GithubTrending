<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Trending · Clean Rows</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">

        <!-- ─── HEADER ─── -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <i class="fab fa-github"></i> Trending
                </div>
                <nav class="header-nav">
                    <a href="#" class="time-link active" data-period="today">Today</a>
                    <a href="#" class="time-link" data-period="weekly">Week</a>
                    <a href="#" class="time-link" data-period="monthly">Month</a>
                </nav>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Filter repos..." id="searchInput" />
                </div>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </header>

        <!-- ─── STATS ─── -->
        <div class="stats-bar">
            <span><i class="fas fa-fire"></i> <span id="repoCount">Loading...</span></span>
            <span><i class="far fa-clock"></i> <span id="updateTime">Just now</span></span>
        </div>

        <!-- ─── FEED ─── -->
        <div class="feed" id="feedContainer"></div>

        <p style="margin-top: 14px; font-size: 0.75rem; color: #999; text-align: center;">
            <i class="fas fa-arrow-right"></i> Click the <i class="fab fa-github"></i> icon to visit a repo
        </p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
