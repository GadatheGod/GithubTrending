<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Trending</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <i class="fab fa-github"></i> Trending
                </div>
                <nav class="header-nav">
                    <a href="#" class="time-link active" data-period="today">Today</a>
                    <span>·</span>
                    <a href="#" class="time-link" data-period="weekly">Week</a>
                    <span>·</span>
                    <a href="#" class="time-link" data-period="monthly">Month</a>
                </nav>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Filter repos..." id="searchInput" />
                </div>
                <select id="languageFilter" class="language-select">
                    <option value="">All Languages</option>
                </select>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <div class="feed" id="feedContainer">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading trending repositories...</p>
            </div>
        </div>
    </div>

    <script src="js/filters.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
