<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <h1>GitHub Trending</h1>
        <p class="subtitle">Discover what's popular on GitHub</p>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="controls">
      <div class="time-filters">
        <button class="filter-btn active" data-period="today">Today</button>
        <button class="filter-btn" data-period="weekly">Weekly</button>
        <button class="filter-btn" data-period="monthly">Monthly</button>
      </div>

      <div class="search-sort">
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" placeholder="Search repositories..." autocomplete="off">
        </div>

        <select id="languageFilter" class="language-select">
          <option value="">All Languages</option>
        </select>

        <select id="sortSelect" class="sort-select">
          <option value="rank">Sort by Rank</option>
          <option value="stars">Sort by Stars</option>
        </select>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading trending repositories...</p>
    </div>

    <div id="error" class="error-message" style="display: none;"></div>

    <div id="repoList" class="repo-list" style="display: none;"></div>

    <div id="noResults" class="no-results" style="display: none;">
      <p>No repositories match your search.</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Data sourced from <a href="https://github.com/trending" target="_blank" rel="noopener">GitHub Trending</a>. Updated daily.</p>
    </div>
  </footer>

  <script src="js/filters.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
