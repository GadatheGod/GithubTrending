  </text>
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">Today</text>
  <text x="280" y="40" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">Week</text>
  <text x="350" y="40" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">Month</text>
  
  <!-- Stats Bar -->
