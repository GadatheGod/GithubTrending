  <text x="120" y="115" font-family="Arial, sans-serif" font-size="14" fill="#666">Repository</text>
  <text x="400" y="115" font-family="Arial, sans-serif" font-size="14" fill="#666">Description</text>
  <text x="800" y="115" font-family="Arial, sans-serif" font-size="14" fill="#666">Stars</text>
  <text x="920" y="115" font-family="Arial, sans-serif" font-size="14" fill="#666">Language</text>
  
  <!-- Sample Rows -->
  <rect y="130" width="1200" height="60" fill="white"/>
  <text x="60" y="165" font-family="Arial, sans-serif" font-size="14" fill="#999">1</text>
  <text x="120" y="165" font-family="Arial, sans-serif" font-size="14" fill="#111" font-weight="bold">anthropic/system-prompts</text>
  <text x="400" y="165" font-family="Arial, sans-serif" font-size="12" fill="#555">Extracted system prompts from Claude, Opus, GPT...</text>
  <text x="800" y="165" font-family="Arial, sans-serif" font-size="12" fill="#ff6600" font-weight="bold">51k</text>
  <circle cx="940" cy="160" r="5" fill="#3572A5"/>
  <text x="960" y="165" font-family="Arial, sans-serif" font-size="12" fill="#444">Python</text>
  
  <rect y="190" width="1200" height="60" fill="white"/>
  <text x="60" y="225" font-family="Arial, sans-serif" font-size="14" fill="#999">2</text>
  <text x="120" y="225" font-family="Arial, sans-serif" font-size="14" fill="#111" font-weight="bold">meetily/meetily</text>
  <text x="400" y="225" font-family="Arial, sans-serif" font-size="12" fill="#555">Privacy-first AI meeting assistant with 4x faster...</text>
  <text x="800" y="225" font-family="Arial, sans-serif" font-size="12" fill="#ff6600" font-weight="bold">12k</text>
  <circle cx="940" cy="220" r="5" fill="#dea584"/>
  <text x="960" y="225" font-family="Arial, sans-serif" font-size="12" fill="#444">Rust</text>
  
  <rect y="250" width="1200" height="60" fill="white"/>
  <text x="60" y="285" font-family="Arial, sans-serif" font-size="14" fill="#999">3</text>
  <text x="120" y="285" font-family="Arial, sans-serif" font-size="14" fill="#111" font-weight="bold">apple/container</text>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="12" fill="#555">A tool for creating and running Linux containers...</text>
  <text x="800" y="285" font-family="Arial, sans-serif" font-size="12" fill="#ff6600" font-weight="bold">8k</text>
  <circle cx="940" cy="280" r="5" fill="#3178c6"/>
  <text x="960" y="285" font-family="Arial, sans-serif" font-size="12" fill="#444">TypeScript</text>
  
  <!-- Watermark -->
  <text x="600" y="750" font-family="Arial, sans-serif" font-size="14" fill="#ccc" text-anchor="middle">
