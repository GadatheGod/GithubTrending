<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f6f6ef"/>
  
  <!-- Header -->
  <rect width="1200" height="60" fill="#ff6600"/>
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">
